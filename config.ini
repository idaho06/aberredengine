; Aberred Engine Configuration
; This file is automatically loaded on startup.
; Missing values will use safe defaults.

[render]
; Internal render resolution (game world is rendered at this size)
width = 640
height = 360
; Background clear color (R,G,B 0-255)
background_color = 0,2,4
; Snap camera/view to integer pixels to avoid sprite atlas bleeding.
; Disable for games with smooth rotation/zoom (e.g. asteroids-style).
pixel_snap_camera = true
; Sampling filter for the final render-target-to-window blit.
; Values: nearest (default), bilinear, trilinear, anisotropic_4x, anisotropic_8x, anisotropic_16x
; render_target_filter = nearest

[window]
; Window size in pixels TODO: currently ignored
width = 1280
height = 720

; Target frames per second
target_fps = 120
; Enable vertical sync
vsync = true
; Start in fullscreen mode
fullscreen = false
